apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phobos-maptool-ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: phobos-maptool-service
              port:
                number: 80